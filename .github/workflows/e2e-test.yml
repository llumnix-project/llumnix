name: E2E Test

on:
  workflow_call:
    inputs:
      image_tag:
        description: 'Image tag to use for deployment'
        required: true
        type: string
      test_namespace:
        description: 'Kubernetes namespace for testing'
        required: false
        type: string
        default: 'llumnix-e2e-test'
      kustomize_dir:
        description: 'Kustomize directory for deployment configuration'
        required: false
        type: string
        default: 'neutral/full-mode-scheduling/load-balance'
      benchmark_command:
        description: 'Benchmark command to run inside the pod'
        required: false
        type: string
        default: 'vllm bench serve --base-url http://gateway:8089 --model Qwen/Qwen3-30B-A3B-FP8 --num-prompts 10 --ready-check-timeout-sec 0 --request-rate 1 --save-result --save-detailed --result-dir /tmp/benchmark-result'
      benchmark_timeout:
        description: 'Benchmark timeout in seconds'
        required: false
        type: number
        default: 600
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to use for deployment'
        required: true
        type: string
      test_namespace:
        description: 'Kubernetes namespace for testing'
        required: false
        type: string
        default: 'llumnix-e2e-test'
      kustomize_dir:
        description: 'Kustomize directory for deployment configuration'
        required: false
        type: string
        default: 'neutral/full-mode-scheduling/load-balance'
      benchmark_command:
        description: 'Benchmark command to run inside the pod'
        required: false
        type: string
        default: 'vllm bench serve --base-url http://gateway:8089 --model Qwen/Qwen3-30B-A3B-FP8 --num-prompts 10 --ready-check-timeout-sec 0 --request-rate 1 --save-result --save-detailed --result-dir /tmp/benchmark-result'
      benchmark_timeout:
        description: 'Benchmark timeout in seconds'
        required: false
        type: number
        default: 600

jobs:
  e2e-test:
    name: Deploy and Run E2E Test
    runs-on: [self-hosted, cpu, kubectl]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          submodules: recursive
          clean: true

      - name: Setup Kubectl
        run: |
          kubectl cluster-info

      - name: Cleanup existing resources in namespace
        timeout-minutes: 10
        run: |
          echo "Cleaning up existing resources in namespace: ${{ inputs.test_namespace }}"
          kubectl delete leaderworkersets --all -n ${{ inputs.test_namespace }} --ignore-not-found=true || true
          kubectl delete jobs --all -n ${{ inputs.test_namespace }} --ignore-not-found=true || true
          kubectl delete deployments --all -n ${{ inputs.test_namespace }} --ignore-not-found=true || true
          kubectl delete statefulsets --all -n ${{ inputs.test_namespace }} --ignore-not-found=true || true
          kubectl delete daemonsets --all -n ${{ inputs.test_namespace }} --ignore-not-found=true || true
          kubectl delete pods --all -n ${{ inputs.test_namespace }} --ignore-not-found=true || true
          kubectl delete services --all -n ${{ inputs.test_namespace }} --ignore-not-found=true || true
          echo "Cleanup completed"

      - name: Deploy Llumnix
        working-directory: ./deploy
        env:
          REPOSITORY: llumnix-registry.cn-beijing.cr.aliyuncs.com/llumnix
          GATEWAY_IMAGE_TAG: ${{ inputs.image_tag }}
          SCHEDULER_IMAGE_TAG: ${{ inputs.image_tag }}
          VLLM_IMAGE_TAG: ${{ inputs.image_tag }}
          DISCOVERY_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          ./group_update.sh ${{ inputs.test_namespace }} ${{ inputs.kustomize_dir }}

      - name: Wait for deployment ready
        timeout-minutes: 15
        run: |
          NS=${{ inputs.test_namespace }}
          echo "Waiting for all pods to be ready in namespace: $NS"

          for i in $(seq 1 90); do
            # Check for permanently failed pods (terminal state, won't recover)
            FAILED_PODS=$(kubectl get pods -n "$NS" --field-selector=status.phase=Failed --no-headers 2>/dev/null || true)
            if [ -n "$FAILED_PODS" ]; then
              echo "ERROR: Detected permanently failed pods:"
              kubectl get pods -n "$NS"
              exit 1
            fi

            TOTAL=$(kubectl get pods -n "$NS" --no-headers 2>/dev/null | wc -l)
            READY=$(kubectl get pods -n "$NS" --no-headers 2>/dev/null | grep -cP '^\S+\s+(\d+)/\1\s+Running' || true)
            NOT_READY=$((TOTAL - READY))

            echo "[$i/90] Pods ready: $READY/$TOTAL"
            kubectl get pods -n "$NS" --no-headers 2>/dev/null || true

            if [ "$TOTAL" -gt 0 ] && [ "$NOT_READY" -eq 0 ]; then
              echo "All $TOTAL pods are ready!"
              exit 0
            fi
            sleep 10
          done

          echo "ERROR: Timed out waiting for pods to be ready"
          kubectl get pods -n "$NS"
          exit 1

      - name: Run Benchmark
        id: benchmark
        working-directory: ./benchmarks
        run: |
          ./run_benchmark.sh -n ${{ inputs.test_namespace }} \
            --job-name e2e-benchmark \
            --command "${{ inputs.benchmark_command }}"

      - name: Wait for benchmark completion
        run: |
          echo "Waiting for benchmark to complete..."
          for i in $(seq 1 ${{ inputs.benchmark_timeout }}); do
            # Check if job failed
            JOB_STATUS=$(kubectl get job e2e-benchmark -n ${{ inputs.test_namespace }} -o jsonpath='{.status.conditions[?(@.type=="Failed")].status}' 2>/dev/null || true)
            if [ "$JOB_STATUS" == "True" ]; then
              echo "ERROR: Benchmark job failed!"
              kubectl logs job/e2e-benchmark -n ${{ inputs.test_namespace }} | tail -50
              exit 1
            fi
            
            # Check if benchmark completed successfully via log
            LOGS=$(kubectl logs job/e2e-benchmark -n ${{ inputs.test_namespace }} 2>/dev/null || true)
            if echo "$LOGS" | grep -q "Benchmark completed successfully."; then
              echo "Benchmark completed successfully!"
              exit 0
            fi
            
            sleep 1
          done
          
          echo "ERROR: Benchmark timed out after ${{ inputs.benchmark_timeout }}s"
          kubectl logs job/e2e-benchmark -n ${{ inputs.test_namespace }} | tail -50
          exit 1

      - name: Check benchmark results
        run: |
          # Get benchmark pod name
          POD_NAME=$(kubectl get pods -n ${{ inputs.test_namespace }} -l job-name=e2e-benchmark -o jsonpath='{.items[0].metadata.name}')
          
          # Copy results
          mkdir -p benchmark-results
          kubectl cp ${{ inputs.test_namespace }}/${POD_NAME}:/tmp/benchmark-result ./benchmark-results/ || true
          
          # Check benchmark log for success indicators
          echo "=== Benchmark Log ==="
          kubectl logs job/e2e-benchmark -n ${{ inputs.test_namespace }} | tail -100
          
          # Parse results and check success rate
          echo "=== Checking Success Rate ==="
          if [ -f "benchmark-results/benchmark-log.txt" ]; then
            SUCCESSFUL=$(grep -oP 'Successful requests:\s+\K[0-9]+' benchmark-results/benchmark-log.txt || echo "0")
            FAILED=$(grep -oP 'Failed requests:\s+\K[0-9]+' benchmark-results/benchmark-log.txt || echo "0")
            TOTAL=$((SUCCESSFUL + FAILED))
            if [ "$TOTAL" -gt 0 ]; then
              SUCCESS_RATE=$(echo "scale=2; $SUCCESSFUL * 100 / $TOTAL" | bc)
            else
              SUCCESS_RATE="0"
            fi
            echo "Successful: ${SUCCESSFUL}, Failed: ${FAILED}, Total: ${TOTAL}"
            echo "Success rate: ${SUCCESS_RATE}%"
            
            if [ "$FAILED" -gt 0 ]; then
              echo "ERROR: ${FAILED} requests failed, expected 0"
              exit 1
            fi
            echo "✓ All requests succeeded"
          else
            echo "WARNING: Could not find benchmark log, checking job status..."
            kubectl describe job e2e-benchmark -n ${{ inputs.test_namespace }}
          fi

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: benchmark-results/
          retention-days: 7

      - name: Collect component logs
        if: failure()
        run: |
          mkdir -p component-logs
          NS=${{ inputs.test_namespace }}
          # Deployment pods: gateway, scheduler, redis
          for app in gateway scheduler redis; do
            for pod in $(kubectl get pods -n "$NS" -l app="$app" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
              echo "Collecting logs from $pod..."
              kubectl logs "$pod" -n "$NS" --all-containers > "component-logs/${pod}.log" 2>&1 || true
            done
          done
          # LWS pods (vllm): labeled by leaderworkerset.sigs.k8s.io/name
          for pod in $(kubectl get pods -n "$NS" -l leaderworkerset.sigs.k8s.io/name -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            echo "Collecting logs from LWS pod $pod..."
            kubectl logs "$pod" -n "$NS" --all-containers > "component-logs/${pod}.log" 2>&1 || true
          done
          # Collect pod status for debugging
          kubectl get pods -n "$NS" -o wide > component-logs/pod-status.txt 2>&1 || true
          kubectl describe pods -n "$NS" > component-logs/pod-describe.txt 2>&1 || true

      - name: Upload component logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: component-logs-${{ github.run_id }}
          path: component-logs/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          echo "Cleaning up resources in namespace..."
          kubectl delete leaderworkersets --all -n ${{ inputs.test_namespace }} --ignore-not-found=true || true
          kubectl delete jobs --all -n ${{ inputs.test_namespace }} --ignore-not-found=true || true
          kubectl delete deployments --all -n ${{ inputs.test_namespace }} --ignore-not-found=true || true
          kubectl delete statefulsets --all -n ${{ inputs.test_namespace }} --ignore-not-found=true || true
          kubectl delete daemonsets --all -n ${{ inputs.test_namespace }} --ignore-not-found=true || true
          kubectl delete pods --all -n ${{ inputs.test_namespace }} --ignore-not-found=true || true
          kubectl delete services --all -n ${{ inputs.test_namespace }} --ignore-not-found=true || true
          echo "Cleanup completed"
