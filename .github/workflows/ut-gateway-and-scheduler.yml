name: Gateway and Scheduler Unit Tests

on:
  workflow_call:
  workflow_dispatch:

env:
  DEV_IMAGE: llumnix-registry.cn-beijing.cr.aliyuncs.com/llumnix/vllm:dev-20260204-140225

jobs:
  # ── Build tokenizer library (cached) ────────────────────────────────────
  build-tokenizers:
    name: Build Tokenizer Library
    runs-on: [self-hosted, cpu]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache tokenizer build artifact
        id: cache-tokenizers
        uses: actions/cache@v4
        with:
          path: lib/sglang/sgl-model-gateway/bindings/golang/target/release
          key: tokenizers-${{ runner.os }}-${{ hashFiles('lib/sglang/sgl-model-gateway/**') }}

      - name: Build tokenizer library in dev container
        if: steps.cache-tokenizers.outputs.cache-hit != 'true'
        run: ./scripts/build_tokenizers.sh --image ${{ env.DEV_IMAGE }}

  # ── Go unit tests ────────────────────────────────────────────────────────
  go-unit-test:
    name: Go Unit Tests
    runs-on: [self-hosted, cpu]
    needs: build-tokenizers
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore tokenizer build artifact
        uses: actions/cache@v4
        with:
          path: lib/sglang/sgl-model-gateway/bindings/golang/target/release
          key: tokenizers-${{ runner.os }}-${{ hashFiles('lib/sglang/sgl-model-gateway/**') }}

      - name: Run Go unit tests in dev container
        run: |
          docker run --rm \
            --network host \
            -v "$(pwd):/workspace" \
            -w /workspace \
            ${{ env.DEV_IMAGE }} \
            bash -c "go mod tidy && make unit-test"
