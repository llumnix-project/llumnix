name: Gateway and Scheduler Unit Tests

on:
  workflow_call:
  workflow_dispatch:

env:
  DEV_IMAGE: llumnix-registry.cn-beijing.cr.aliyuncs.com/llumnix/vllm:dev-20260204-140225

jobs:
  go-unit-test:
    name: Go Unit Tests
    runs-on: [self-hosted, cpu]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          submodules: recursive
          clean: true

      - name: Compute cache key
        id: cache-key
        run: |
          KEY="tokenizers-${{ runner.os }}-$(git submodule status lib/sglang | awk '{print $1}' | tr -d '+-')-$(find patches/sgl-model-gateway -type f | sort | xargs sha256sum | sha256sum | awk '{print $1}')"
          echo "key=${KEY}" >> $GITHUB_OUTPUT

      - name: Cache tokenizer build artifact
        id: cache-tokenizers
        uses: actions/cache@v4
        with:
          path: lib/sglang/sgl-model-gateway/bindings/golang/target/release
          key: ${{ steps.cache-key.outputs.key }}

      - name: Build tokenizer library in dev container
        if: steps.cache-tokenizers.outputs.cache-hit != 'true'
        run: ./scripts/build_tokenizers.sh --apply-patch --image ${{ env.DEV_IMAGE }}

      - name: Run Go unit tests in dev container
        run: |
          docker run --rm \
            --network host \
            -v "$(pwd):/workspace" \
            -w /workspace \
            ${{ env.DEV_IMAGE }} \
            bash -c "go mod tidy && make unit-test"

      - name: Fix file ownership
        if: always()
        run: sudo chown -R $(id -u):$(id -g) .
