name: Nightly E2E Test

on:
  schedule:
    # 每天凌晨 3 点运行 (UTC 时间 19:00，对应北京时间 3:00)
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  generate-tag:
    name: Generate Nightly Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.set-tag.outputs.tag }}
    steps:
      - name: Set nightly tag
        id: set-tag
        run: |
          DATE=$(date +%Y%m%d)
          RANDOM_SUFFIX=$(printf "%04d" $((RANDOM % 10000)))
          TAG="nightly-${DATE}-${RANDOM_SUFFIX}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Using nightly tag: ${TAG}"

  build-images:
    name: Build Images
    uses: ./.github/workflows/docker-build.yml
    needs: generate-tag
    with:
      target: all
      image_tag: ${{ needs.generate-tag.outputs.tag }}
    secrets: inherit

  e2e-test:
    name: Run E2E Test
    uses: ./.github/workflows/e2e-test.yml
    needs: [generate-tag, build-images]
    if: always()
    with:
      image_tag: ${{ needs.build-images.result == 'success' && needs.generate-tag.outputs.tag || 'latest' }}
      test_namespace: 'llumnix-daily-test'
      kustomize_dir: 'neutral/full-mode-scheduling/load-balance'
    secrets: inherit

  notify-failure:
    name: Send DingTalk Notification on Failure
    needs: e2e-test
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Get workflow run information
        id: get-info
        run: |
          echo "workflow_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          echo "commit_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Send DingTalk notification
        run: |
          WORKFLOW_URL="${{ steps.get-info.outputs.workflow_url }}"
          COMMIT_SHA="${{ steps.get-info.outputs.commit_sha }}"
          BRANCH="${{ steps.get-info.outputs.branch }}"
          TAG="${{ needs.generate-tag.outputs.tag }}"
          
          # Create markdown message for DingTalk
          MESSAGE="{
            \"msgtype\": \"markdown\",
            \"markdown\": {
              \"title\": \"Nightly E2E Test Failed\",
              \"text\": \"## ❌ Nightly E2E Test Failed\\n\\n**Project**: llumnix\\n**Branch**: ${BRANCH}\\n**Commit**: ${COMMIT_SHA}\\n**Tag**: ${TAG}\\n**Workflow**: [View Workflow Run](${WORKFLOW_URL})\\n**Time**: $(date '+%Y-%m-%d %H:%M:%S') (UTC)\\n\\n⚠️ Please check the workflow logs for details.\"
            },
            \"at\": {
              \"isAtAll\": true
            }
          }"
          
          # Send request to DingTalk webhook
          curl -X POST \
            -H 'Content-Type: application/json' \
            -d "$MESSAGE" \
            '${{ secrets.DINGTALK_WEBHOOK_URL }}'
