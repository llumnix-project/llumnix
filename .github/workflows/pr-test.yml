name: PR Test

on:
  push:
    branches:
      - main
      - master
  pull_request_target:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/lint.yml

  go-ut:
    name: Go Unit Tests
    uses: ./.github/workflows/ut-gateway-and-scheduler.yml
    secrets: inherit

  llumnix-ut:
    name: Python llumnix Unit Tests
    uses: ./.github/workflows/ut-llumnix.yml
    secrets: inherit

  discovery-ut:
    name: Python discovery Unit Tests
    uses: ./.github/workflows/ut-discovery.yml
    secrets: inherit

  all-pr-tests:
    name: All PR Tests
    runs-on: [self-hosted, cpu]
    needs:
      - lint
      - go-ut
      - llumnix-ut
      - discovery-ut
    steps:
      - name: All tests passed
        run: echo "All tests passed!"

