apiVersion: v1
kind: Service
metadata:
  name: gateway
  labels:
    app: gateway
    role: gateway
spec:
  type: ClusterIP
  ports:
    - port: 8089
      targetPort: 8089
      protocol: TCP
      name: http
  selector:
    app: gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app: gateway
    role: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        role: gateway
    spec:
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: nas-llumnix
      terminationGracePeriodSeconds: 300
      imagePullSecrets:
      - name: aliyun-registry-secret
      containers:
      - name: gateway
        image: beijing-pooling-registry-vpc.cn-beijing.cr.aliyuncs.com/llumnix/llumnix-dev:gateway-20260130-111650
        imagePullPolicy: Always
        command: ["/usr/local/bin/gateway"]
        args:
        - "--port"
        - "8089"
        - "-v"
        - "4"
        - "--scheduler-endpoints"
        - "scheduler:8088"
        - "--llm-backend-discovery"
        - "redis"
        - "--scheduler-discovery"
        - "enpoints"
        - "--discovery-redis-host"
        - "redis"
        - "--discovery-redis-port"
        - "6379"
        - "--schedule-policy"
        - "round-robin"
        - "--tokenizer-path"
        - "/models/deepseek-moe-16b-base"
        - "--enable-full-mode-scheduling"
        - "False"
        ports:
        - containerPort: 8089
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8089
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8089
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
          - name: model-storage
            mountPath: /models
            readOnly: true
