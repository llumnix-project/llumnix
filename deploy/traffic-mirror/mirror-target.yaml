# Lightweight HTTP echo service as the mirror target (no GPU required).
# Uses the same Python image already in the registry (no new image push needed).
# Accepts any POST and returns 200; check stdout logs to verify mirror traffic:
#   kubectl logs -f deployment/mirror-target -n <namespace>
apiVersion: v1
kind: Service
metadata:
  name: mirror-target
  labels:
    app: mirror-target
    role: mirror
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: mirror-target
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mirror-target
  labels:
    app: mirror-target
    role: mirror
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mirror-target
  template:
    metadata:
      labels:
        app: mirror-target
        role: mirror
    spec:
      containers:
      - name: echo-server
        image: llumnix-registry.cn-beijing.cr.aliyuncs.com/llumnix/python3:3.12-slim-bookworm
        command: ["python3", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import sys, datetime

          class Handler(BaseHTTPRequestHandler):
              def do_POST(self):
                  length = int(self.headers.get('Content-Length', 0))
                  body = self.rfile.read(length) if length else b''
                  ts = datetime.datetime.now().strftime('%Y-%m-%d %H:%M:%S')
                  print(f'[{ts}] {self.command} {self.path} ({length} bytes)', flush=True)
                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.end_headers()
                  self.wfile.write(b'{"status":"mirrored"}\n')

              def do_GET(self):
                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.end_headers()
                  self.wfile.write(b'{"status":"ok"}\n')

              def log_message(self, fmt, *args):
                  pass

          print('Mirror target echo server listening on :8000', flush=True)
          HTTPServer(('0.0.0.0', 8000), Handler).serve_forever()
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        readinessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
