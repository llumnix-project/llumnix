apiVersion: v1
kind: Service
metadata:
  name: scheduler
  labels:
    app: scheduler
    role: scheduler
spec:
  type: ClusterIP
  ports:
    - port: 8088
      targetPort: 8088
      protocol: TCP
      name: http
  selector:
    app: scheduler
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  labels:
    app: scheduler
    role: scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
        role: scheduler
    spec:
      terminationGracePeriodSeconds: 300
      imagePullSecrets:
      - name: aliyun-registry-secret
      containers:
      - name: scheduler
        image: beijing-pooling-registry-vpc.cn-beijing.cr.aliyuncs.com/llumnix/llumnix-dev:gateway-20260116-001948
        imagePullPolicy: Always
        command: ["/usr/local/bin/llm-gateway"]
        args:
        - "--port"
        - "8088"
        - "-v"
        - "4"
        - "--host"
        - "0.0.0.0"
        - "--use-discovery"
        - "redis"
        - "--schedule-mode"
        - "--schedule-policy"
        - "load-balance"
        - "--llumnix-cms-redis-host"
        - "redis"
        - "--llumnix-cms-redis-port"
        - "6379"
        - "--llumnix-cms-pull-status-interval-ms"
        - "5000"
        - "--llumnix-cms-pull-metadata-interval-ms"
        - "10000"
        - "--llumnix-dispatch-neutral-load-metric"
        - "num_requests"
        - "--enable-full-mode-scheduling"
        - "True"
        ports:
        - containerPort: 8088
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8088
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8088
          initialDelaySeconds: 5
          periodSeconds: 5
