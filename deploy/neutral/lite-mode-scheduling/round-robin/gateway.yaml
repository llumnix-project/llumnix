apiVersion: v1
kind: Service
metadata:
  name: gateway
  labels:
    app: gateway
    role: gateway
spec:
  type: ClusterIP
  ports:
    - port: 8089
      targetPort: 8089
      protocol: TCP
      name: http
  selector:
    app: gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app: gateway
    role: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        role: gateway
    spec:
      terminationGracePeriodSeconds: 300
      initContainers:
        - name: download-tokenizer
          image: llumnix-registry.cn-beijing.cr.aliyuncs.com/llumnix/python3:3.12-slim-bookworm
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip3 install modelscope -i https://mirrors.aliyun.com/pypi/simple/ && \
          pip3 install packaging -i https://mirrors.aliyun.com/pypi/simple/ && \
              python3 << 'EOF'
              from modelscope import snapshot_download
              
              model_dir = snapshot_download(
                  'Qwen/Qwen3-30B-A3B-FP8',
                  cache_dir='/tokenizers',
                  allow_patterns=['tokenizer.json', 'tokenizer_config.json']
              )
              
              print(f"download tokenizer done: {model_dir}")
              EOF
          volumeMounts:
            - name: tokenizer-storage
              mountPath: /tokenizers
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      containers:
        - name: gateway
          image: ${REPOSITORY}/gateway:${GATEWAY_IMAGE_TAG}
          imagePullPolicy: Always
          command: ["/usr/local/bin/gateway"]
          args:
            - "--port"
            - "8089"
            - "-v"
            - "4"
            - "--llm-backend-discovery"
            - "redis"
            - "--discovery-redis-host"
            - "redis"
            - "--discovery-redis-port"
            - "6379"
            - "--scheduling-policy"
            - "round-robin"
            - "--tokenizer-path"
            - "/tokenizers/Qwen/Qwen3-30B-A3B-FP8"
            - "--max-model-len"
            - "40960"
            - "--enable-full-mode-scheduling=false"
          ports:
            - containerPort: 8089
              name: http
              protocol: TCP
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8089
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8089
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: tokenizer-storage
              mountPath: /tokenizers
              readOnly: true
      volumes:
        - name: tokenizer-storage
          emptyDir: {}
