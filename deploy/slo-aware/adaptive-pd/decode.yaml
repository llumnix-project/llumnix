apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: decode
spec:
  replicas: 2
  leaderWorkerTemplate:
    size: 1
    workerTemplate:
      spec:
        terminationGracePeriodSeconds: 30
        containers:
        - name: vllm
          image: ${REPOSITORY}/vllm:${VLLM_IMAGE_TAG}
          securityContext:
            privileged: true
            capabilities:
              add:
              - IPC_LOCK
              - SYS_RAWIO
              - SYS_RESOURCE
            runAsGroup: 0
            runAsUser: 0
          imagePullPolicy: Always
          command:
            - /bin/bash
            - -c

          args:
            - |-

             # Clear /dev/shm on start to prevent running out of space when crashes occur
             find /dev/shm -type f -delete

             # unlimit memlock to support rdma
             ulimit -SHl unlimited

             #################
             # RUN vLLM decode worker
             #################

             CUDA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES} exec vllm serve \
                Qwen/Qwen3-32B \
                --port 8000 \
                --trust-remote-code \
                --max-model-len 16384 \
                --enforce-eager \
                --tensor-parallel-size 1 \
                --kv-transfer-config '{"kv_connector": "HybridConnector", "kv_role": "kv_consumer", "kv_connector_extra_config": {"backend": "kvt+migration", "rpc_port": 28000}}' \
                --gpu-memory-utilization 0.85

          env:
          # Redis configuration for Llumnix
          - name: LLUMNIX_CMS_REDIS_ADDRESS
            value: "redis"
          - name: LLUMNIX_CMS_REDIS_PORT
            value: "6379"
          - name: LLUMNIX_CMS_REDIS_USERNAME
            value: ""
          - name: LLUMNIX_CMS_REDIS_PASSWORD
            value: ""
          - name: VLLM_ENABLE_LLUMNIX
            value: "1"
          - name: LLUMNIX_ENABLE_MIGRATION
            value: "0"
          - name: LLUMNIX_INSTANCE_TYPE
            value: "decode"

          # download models
          - name: VLLM_USE_MODELSCOPE
            value: "true"

          # kvt args
          - name: MC_MTU
            value: "1024"
          - name: VLLM_ENABLE_BYPASS_TASK
            value: "1"

          - name: TRITON_LIBCUDA_PATH
            value: /usr/lib64
          - name: VLLM_SKIP_P2P_CHECK
            value: "1"
          - name: VLLM_RANDOMIZE_DP_DUMMY_INPUTS
            value: "1"
          - name: VLLM_USE_DEEP_GEMM
            value: "1"
          - name: NVIDIA_GDRCOPY
            value: enabled
          - name: NVSHMEM_REMOTE_TRANSPORT
            value: ibgda
          - name: NVSHMEM_IB_ENABLE_IBGDA
            value: "true"
          - name: NVSHMEM_BOOTSTRAP_UID_SOCK_IFNAME
            value: eth0
          - name: GLOO_SOCKET_IFNAME
            value: eth0
          - name: NCCL_SOCKET_IFNAME
            value: eth0
          - name: VLLM_LOGGING_LEVEL
            value: DEBUG
          - name: VLLM_KV_TRANS_PROTOCOL
            value: rdma

          # Use cache directories from the mounted volume under one easy to mount
          # root directory.
          - name: CUDA_CACHE_PATH
            value: /var/cache/vllm/cuda
          - name: CCACHE_DIR
            value: /var/cache/vllm/ccache
          - name: VLLM_CACHE_ROOT
            value: /var/cache/vllm/vllm
          - name: FLASHINFER_WORKSPACE_BASE
            value: /var/cache/vllm/flashinfer
          # HuggingFace is likely to be quite a bit larger, give it its own cache
          - name: HF_HUB_CACHE
            value: /var/cache/huggingface
          
          volumeMounts:
          - name: infiniband-devices
            mountPath: /dev/infiniband
          ports:
          - containerPort: 8000
            name: metrics
            protocol: TCP
          startupProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 0
            periodSeconds: 1
            timeoutSeconds: 5
            failureThreshold: 2700
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: metrics
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            limits:
              ephemeral-storage: 256Gi
              memory: 256Gi
              nvidia.com/gpu: "1"
            requests:
              cpu: 8
              ephemeral-storage: 256Gi
              memory: 256Gi
              nvidia.com/gpu: "1"
        - name: discovery
          image: ${REPOSITORY}/discovery:${DISCOVERY_IMAGE_TAG}
          command:
            - /bin/bash
            - -c
          args:
            - |-
              cd /discovery && \
              exec python3 -m discovery.discovery \
              --instance_type decode \
              --pod_name $(POD_NAME) \
              --entrypoint_ip $(POD_IP) \
              --entrypoint_port 8000 \
              --kv_transfer_ip $(POD_IP) \
              --kv_transfer_port 28000 \
              --dp_size_local 1 \
              --redis_address redis \
              --redis_port 6379
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
        volumes:
          - name: infiniband-devices
            hostPath:
              path: /dev/infiniband
              type: Directory
