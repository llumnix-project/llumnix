# Ref: https://aliyuque.antfin.com/alicode/docs/btevdryaniom98ry
name: '[Llumnix] SGLang Image Build'

params:
  engine:
    description: 'engine name'
    required: false
    type: string
    options: [ "sglang" ]
    default: 'sglang'
  base_image:
    description: 'base image'
    required: false
    type: string
    default: 'beijing-pooling-registry-vpc.cn-beijing.cr.aliyuncs.com/llumnix/llumnix-dev:build_sglang_image_sglang_202509261636'

envs:
  BASE_IMAGE: ${{params.base_image}}
  ACR_USERNAME_BEIJING: ${{vars.acr_username_beijing}}
  ACR_PASSWORD_BEIJING: ${{secrets.acr_password_beijing}}
  AONE_USERNAME: ${{vars.aone_code_registry_username}}
  AONE_TOKEN: ${{secrets.aone_code_registry_token}}

jobs:
  image_build_poc:
    runs-on:
      - self-hosted
      - bladellm-llumnix
    timeout: 1h
    steps:
      - id: date
        run: |
          echo "Getting current date for image tagging"
          echo "$(date "+%Y%m%d%H%M")" > "${{outputs.time.path}}"
          echo "Date retrieved: $(date "+%Y%m%d%H%M")"
      - id: image-name
        run: |
          echo "Generating image name"
          if [[ "${{git.tag}}" != "null" ]]; then
            echo "beijing-pooling-registry-vpc.cn-beijing.cr.aliyuncs.com/llumnix/llumnix-dev:${{git.tag}}_${{params.engine}}_${{steps.date.outputs.time}}" >> "${{outputs.image_name.path}}"
            echo "Generated tagged image name: beijing-pooling-registry-vpc.cn-beijing.cr.aliyuncs.com/llumnix/llumnix-dev:${{git.tag}}_${{params.engine}}_${{steps.date.outputs.time}}"
          else
            echo "beijing-pooling-registry-vpc.cn-beijing.cr.aliyuncs.com/llumnix/llumnix-dev:${{git.branch}}_${{params.engine}}_${{steps.date.outputs.time}}" >> "${{outputs.image_name.path}}"
            echo "Generated branched image name: beijing-pooling-registry-vpc.cn-beijing.cr.aliyuncs.com/llumnix/llumnix-dev:${{git.branch}}_${{params.engine}}_${{steps.date.outputs.time}}"
          fi
      - <<: !include /.aoneci/include/clear_running_container.yml
      - <<: !include /.aoneci/include/checkout_code.yml
      - id: extract-base-image-registry
        run: |
          echo "Extracting base image registry"
          BASE_IMAGE_REGISTRY=$(echo "${BASE_IMAGE}" | cut -d'/' -f1)
          echo "Base image registry: $BASE_IMAGE_REGISTRY"
          echo "$BASE_IMAGE_REGISTRY" >> "${{outputs.base_image_registry.path}}"
      - id: pull-base-image
        run: |
          echo "Logging into registry and pulling base image"
          echo "Attempting to login to registry: ${{steps.extract-base-image-registry.outputs.base_image_registry}}"
          echo "${ACR_PASSWORD_BEIJING}" | docker login --username "${ACR_USERNAME_BEIJING}" --password-stdin "${{steps.extract-base-image-registry.outputs.base_image_registry}}"
          if [ $? -ne 0 ]; then
            echo "Docker login failed"
            exit 1
          fi
          echo "Pulling base image: ${BASE_IMAGE}"
          docker pull ${BASE_IMAGE}
          if [ $? -ne 0 ]; then
            echo "Docker pull failed"
            exit 1
          fi
          echo "Base image pulled successfully"
      - id: build-image
        run: |
          echo "Starting docker image build process"
          echo "Build args - BASE_IMAGE: ${BASE_IMAGE}"
          echo "Target image: ${{steps.image-name.outputs.image_name}}"
          echo "Dockerfile: dockerfile/Dockerfile.${{params.engine}}"
          docker build \
            --build-arg BASE_IMAGE=${BASE_IMAGE} \
            --build-arg AONE_USERNAME=${AONE_USERNAME} \
            --build-arg AONE_TOKEN=${AONE_TOKEN} \
            -t ${{steps.image-name.outputs.image_name}} \
            -f dockerfile/Dockerfile.${{params.engine}} .
          if [ $? -ne 0 ]; then
            echo "Docker build failed"
            exit 1
          fi
          echo "Docker image built successfully"
      - id: push-image
        run: |
          echo "Pushing docker image to registry"
          echo "Logging into target registry"
          echo "${ACR_PASSWORD_BEIJING}" | docker login --username "${ACR_USERNAME_BEIJING}" --password-stdin beijing-pooling-registry-vpc.cn-beijing.cr.aliyuncs.com
          if [ $? -ne 0 ]; then
            echo "Docker login failed"
            exit 1
          fi
          echo "Pushing image: ${{steps.image-name.outputs.image_name}}"
          docker push ${{steps.image-name.outputs.image_name}}
          if [ $? -ne 0 ]; then
            echo "Docker push failed"
            exit 1
          fi
          echo "Docker image pushed successfully"
