id: checkout_code
run: |
  export GIT_LFS_SKIP_SMUDGE=1
  git clone http://gitlab-ci-token:${{git.ciToken}}@code.alibaba-inc.com/PAI-LLM/llumnix .
  set -ex
  if [[ "${{git.tag}}" != "null" ]]; then
    git checkout ${{git.tag}}
  elif [[ "${{git.merge_request.sourceBranch}}" != "null" ]] && [[ "${{git.merge_request.targetBranch}}" != "null" ]] ; then
    git checkout ${{git.merge_request.targetBranch}}
    git config --local user.email "blade_llm_ci_merge@alibaba-inc.com"
    git config --local user.name "BladeLLM CI Merge"
    git merge origin/${{git.merge_request.sourceBranch}}
  else
    git checkout ${{git.branch}}
  fi
