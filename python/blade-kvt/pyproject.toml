[tool.ruff]
line-length = 120
indent-width = 4
exclude = [
  '*_pb2.py',
  '*_pb2_grpc.py',
  'blade_llm/third_party/**',
  '.git/',
  './blade_llm/evals/opencompass_extension/bladellm_config.py',
  'benchmark/**',
  './blade_llm/evals/run_opencompass.py',
  './blade_llm/module/triton/*.py',
  # TODO(xiafei.qiuxf): exclude triton code from checking, reopening soon.
]
target-version = 'py310'

[tool.ruff.lint]
# The following are ruff defaults.
# select = ['E4', 'E7', 'E9', 'F']
# TODO(xiafei.qiuxf): We may still include more rules (as the following) step by step:
# - N
# - ANN
# - RET
# - SLF
# - SIM
# - ARG
# - PTH
# - TD
# - PL
# - RUF (except RUF001)
select = ['E4', 'E7', 'E9', 'F', 'I', 'FLY', 'C901', 'ASYNC', 'LOG', 'G', 'PIE', 'RSE', 'TCH', 'INT', 'FURB', 'PLE', 'PLC', 'PLC', 'PLR', 'C', 'SIM']
ignore = [
  'E741',
  'PLE1205', # seems not works with loguru
  'PLR0913', # too many arguments
  'PLR0912', # too many branches
  'PLR2004', # Magic value used in comparison
  'PLR0915', # Too many statements
  'PLR5501',
  'C408',    # use {}/[]/() for collection construction
  'SIM300',  # yoda expression
  'SIM910',   # dict.get with None as defualt.
  'SIM108',   # if-else-block-instead-of-if-exp
]
logger-objects = ["loguru.logger"]

[tool.ruff.lint.per-file-ignores]
'__init__.py' = [
  'F401'  # allow unused import.
]

'tests/*' = [
  'E402',  # we may do something before importing some modules in tests.
  'ASYNC210',  # allow blocking HTTP method in async function.
  'PLR'
]

[tool.ruff.lint.pylint]
max-args = 10
max-branches = 15

[tool.ruff.lint.mccabe]
# Flag errors (`C901`) whenever the complexity level exceeds 5.
max-complexity = 10

[tool.ruff.format]
quote-style = 'preserve'
docstring-code-format = true

# Use pylint for missing rules in ruff.
# And still excluding pylint from pre-commit due to it's speed.
[tool.pylint.'MESSAGES CONTROL']
disable = 'R,C,W,E,I'
enable = 'E1120'
jobs = 8
